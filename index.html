<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <button id="muteBtn" class="mute-btn" type="button">🔊 Музыка</button>

  <main class="game">
    <section id="startScreen" class="start-screen">
      <h1>Крестики-нолики</h1>
      <p class="subtitle">Выберите режим и начните игру</p>

      <div class="difficulty">
        <p>Выбор режима:</p>
        <button class="difficulty-btn" id="pvpBtn" data-difficulty="pvp">👥 PvP</button>
        <button class="difficulty-btn" id="easyBtn" data-difficulty="easy">😊 Легкий</button>
        <button class="difficulty-btn" id="hardBtn" data-difficulty="hard">🤖 Тяжелый</button>
        <span id="currentDifficulty">Режим не выбран</span>
      </div>

      <button id="startBtn" class="start-btn">Начать игру</button>
    </section>

    <section id="gameScreen" class="game-screen hidden">
      <div class="info">
        <span id="status">Ход: X</span>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">X побед:</span>
          <span class="stat-value" id="xWins">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Ничьих:</span>
          <span class="stat-value" id="draws">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">O побед:</span>
          <span class="stat-value" id="oWins">0</span>
        </div>
      </div>

      <div class="board" id="board"></div>

      <div class="game-actions">
        <button id="backBtn" class="secondary-btn">← Назад</button>
        <button id="restart">Перезапуск</button>
      </div>
    </section>
  </main>

  <script defer src="tictactoe/gameState.js"></script>
  <script defer src="tictactoe/winPatterns.js"></script>
  <script defer src="tictactoe/checkWin.js"></script>
  <script defer src="tictactoe/moveValidator.js"></script>
  <script defer src="tictactoe/botRandom.js"></script>
  <script defer src="tictactoe/botEasy.js"></script>
  <script defer src="tictactoe/botHard.js"></script>
  <script defer src="tictactoe/boardView.js"></script>
  <script defer src="tictactoe/screenManager.js"></script>
  <script defer src="tictactoe/statsView.js"></script>
  <script defer src="tictactoe/statusView.js"></script>
  <script defer src="tictactoe/storage.js"></script>
  <script defer src="tictactoe/audio.js"></script>
  <script defer src="tictactoe/gameController.js"></script>
  <script defer src="tictactoe/index.js"></script>
</body>
</html>
